runtime:
  mode: "dry_run"
  auto_submit: false
  skip_uncertain: true
  save_log: true
  log_path: "data/logs/scoring_log.jsonl"
  processed_registry_path: "data/logs/processed_episodes.json"
  local_video_dir: "data/videos"

scorer:
  version: "v0.1.0"

views:
  main:
    required: true
    role: "global"
    hard_fail_if_missing: true
  left_wrist:
    required: false
    role: "manipulator"
  right_wrist:
    required: false
    role: "manipulator"

rules:
  black_frame:
    hard_fail: 0.50
    suspicious: 0.12
  freeze_ratio:
    hard_fail: 0.80
    suspicious: 0.30
  blur_score:
    hard_fail: 10
    suspicious: 35
  brightness:
    hard_fail_min: 5
    suspicious_min: 25
    hard_fail_max: 250
    suspicious_max: 235
  motion_energy:
    hard_fail: 0.3
    suspicious: 1.5
  start_end_diff:
    hard_fail: null
    suspicious: 5
  idle_ratio:
    hard_fail: null
    suspicious: 0.55

decision_thresholds:
  auto_pass_min_probability: 0.86
  auto_fail_max_probability: 0.25
  min_confidence_submit: 0.78

safety:
  require_episode_id_match_before_submit: true
  require_manual_enable_auto: true
  allow_auto_fail_submit: false
  max_auto_submit_per_run: 10
  stop_on_first_submit_error: true
  submit_cooldown_seconds: 2

frame_sampling:
  percent_points: [0, 10, 25, 50, 75, 90, 100]
  include_motion_peak: true
  include_long_idle_edges: true

default_scores:
  hard_fail:
    speed: 1
    smoothness: 1
    quality: 1
    diversity: 3
    completion: 1
  uncertain:
    speed: 3
    smoothness: 3
    quality: 3
    diversity: 3
    completion: 3

